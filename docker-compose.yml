version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: smartglove-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-smartglove2026}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-smartglove}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  mongo-express:
    image: mongo-express:1.0
    container_name: smartglove-mongo-ui
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-smartglove2026}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-smartglove2026}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

  minio:
    image: minio/minio:latest
    container_name: smartglove-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000" # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: .
    container_name: smartglove-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-80}:8080"
    environment:
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-smartglove2026}@mongodb:27017/${DATABASE_NAME:-smart_glove}?authSource=admin
      DATABASE_NAME: ${DATABASE_NAME:-smart_glove}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://161.246.5.60:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-smartglove-images}
      MINIO_SECURE: "false"
    depends_on:
      - mongodb
      - minio

volumes:
  mongodb_data:
  minio_data: